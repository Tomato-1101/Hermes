name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: lint / typecheck / test (Node)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build IR (composite project references)
        run: pnpm --filter @hermes/ir exec tsc -b

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:run

  sidecar:
    name: build hermes-native (Swift)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build sidecar (release)
        run: swift build --package-path sidecars/macos-native -c release

      - name: Smoke test ping
        shell: bash
        run: |
          SOCK="$RUNNER_TEMP/hermes-native-ci.sock"
          ./sidecars/macos-native/.build/release/hermes-native --socket "$SOCK" --one-shot &
          SERVER_PID=$!
          for i in $(seq 1 50); do [ -S "$SOCK" ] && break; sleep 0.1; done
          RESPONSE=$(echo '{"jsonrpc":"2.0","id":1,"method":"ping"}' | nc -U "$SOCK")
          wait $SERVER_PID || true
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"pong":true'
